rootProject.name = 'kinotic'

// When CLAUDE_CLOUD_COMPILE=true, exclude kinotic-frontend to avoid resolving node-gradle plugin
def skipFrontend = Boolean.parseBoolean(System.getenv('CLAUDE_CLOUD_COMPILE'))

rootDir.listFiles().each {
    if (it.directory && new File(it, 'settings.gradle').exists()) {
        if (skipFrontend && it.name == 'kinotic-frontend') {
            return // skip
        }
        include ":${it.name}"
    }
}

