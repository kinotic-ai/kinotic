---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  resource: "entity"
  version: "default"
  rules:
    # Simple RBAC: admin role can do anything
    - actions: ["*"]
      effect: EFFECT_ALLOW
      roles: ["admin"]

    # ABAC: users can only read entities in their own department
    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: "P.attr.department == R.attr.department"

    # ABAC: users can create entities under their spending limit
    - actions: ["create"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          all:
            of:
              - expr: "P.attr.department == R.attr.department"
              - expr: "R.attr.amount < P.attr.spendingLimit"

    # ABAC: users can read entities with specific statuses
    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["user"]
      condition:
        match:
          expr: "R.attr.status in [\"active\", \"pending\"]"
