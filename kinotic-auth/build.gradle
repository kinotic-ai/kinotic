plugins {
	id 'org.kinotic.java-library-conventions'
	id 'io.freefair.lombok'
    id 'antlr'
}

// Configure ANTLR plugin
generateGrammarSource {
	arguments += ['-package', 'org.kinotic.auth.parser']
	arguments += ['-visitor']

	// Output directly to the parser package
	outputDirectory = file("${projectDir}/src/main/java/org/kinotic/auth/parser")
	enabled = project.gradle.startParameter.taskNames.contains(':kinotic-auth:generateGrammarSource')
}

// Configure Javadoc to exclude generated files
tasks.withType(Javadoc) {
    exclude '**/parser/AbacPolicy*.java'
    exclude '**/parser/AbacPolicy*.interp'
    exclude '**/parser/AbacPolicy*.tokens'
}

tasks.named('sourcesJar') {
	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

dependencies {
    // Kinotic dependencies
    implementation project(':kinotic-idl')

    // Elasticsearch dependencies
    implementation 'co.elastic.clients:elasticsearch-java'
    implementation 'co.elastic.clients:elasticsearch-rest5-client'

    // Json
    implementation 'tools.jackson.core:jackson-core'
    implementation 'tools.jackson.core:jackson-databind'

    // Parsing dependencies
	implementation 'org.antlr:antlr4-runtime:4.13.2'
	antlr 'org.antlr:antlr4:4.13.2'

    // Cedar
    implementation 'com.cedarpolicy:cedar-java:4.8.0:uber'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter'
    // Cedar uses old Jackson (com.fasterxml) internally
    testImplementation 'com.fasterxml.jackson.core:jackson-core:2.18.3'
    testImplementation 'com.fasterxml.jackson.core:jackson-databind:2.18.3'
    testImplementation 'com.fasterxml.jackson.core:jackson-annotations:2.18.3'
    testImplementation 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.18.3'
}
