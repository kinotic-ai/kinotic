replicaCount: 1
nameOverride: ""

image:
  repository: kinoticai/kinotic-server
  pullPolicy: Always
  tag: "4.2.0-SNAPSHOT"
  sha: ""

resources: {}

migration:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  image:
    repository: kinoticai/kinotic-migration
    tag: "4.2.0-SNAPSHOT"
    pullPolicy: Always
    sha: ""

# JVM / Buildpack
properties:
  springActiveProfiles: "production,debug"
  enableJmx: true
  enableNmt: true
  javaToolOptions: "-Djava.net.preferIPv4Stack=true -XX:MaxDirectMemorySize=512m"
  # JPMS opens/exports required by Apache Ignite (java.base reflection) and
  # Calcite/Janino runtime code generation (jdk.compiler internals).
  # Concatenated onto JAVA_TOOL_OPTIONS in the kinotic-server ConfigMap.
  javaModuleAccess: "--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED"
  bplJvmHeadRoom: 10

# Kinotic platform — mirrors the Spring property structure:
#   kinotic.persistence.*  → ports, ES, health
#   kinotic.rpcGateway.*   → STOMP
#   kinotic.ignite.*       → cluster (set in application-kubernetes.yml)
#   kinotic.ssl.*          → TLS (set via tls.enabled below)
kinotic:
  # Public base URL of the SPA (no trailing slash) — used for verification email links
  # and post-OIDC SPA redirects. Must be set per-environment.
  appBaseUrl: "http://localhost:9090"
  # Public base URL of the backend REST endpoints (no trailing slash) — used as the OIDC
  # redirect_uri. Set this when the SPA and backend live on different origins (e.g. SPA on
  # Azure Static Web Apps, backend on AKS). Leave empty to fall back to appBaseUrl, which
  # is correct for any same-origin deploy.
  apiBaseUrl: ""
  # kinotic.email.* — outbound mail via Azure Communication Services
  email:
    # When false, EmailService logs verification URLs instead of sending. Required for
    # local/dev environments without a real ACS resource.
    enabled: false
    endpoint: ""
    senderAddress: ""
    managedIdentityClientId: ""
  # kinotic.webServer.* — static-file server for the SPA. Disabled in deployments
  # where the SPA is hosted outside the cluster (e.g. Azure Storage).
  webServer:
    port: 9090
    enabled: true
  # kinotic.healthCheckPath — health endpoint mounted on the api-gateway router (stomp port)
  healthCheckPath: "/health"
  openApiPort: 8080
  graphqlPort: 4000
  restPort: 58504
  elastic:
    connections:
      - host: "kinotic-es-es-http.elastic.svc"
        port: 9200
        scheme: "http"
    connectionTimeout: "5s"
    socketTimeout: "60s"
    username: "elastic"
    secretName: "kinotic-es-es-elastic-user"
    secretKey: "elastic"
  # kinotic.rpcGateway.stomp.*
  stomp:
    port: 58503
    websocketPath: /v1
  # kinotic.ignite.cluster.* — used by ignite-service template
  cluster:
    discoveryPort: 47500
    communicationPort: 47100

# TLS (kinotic.ssl.*)
tls:
  enabled: false
  secretName: kinotic-tls

evictionTracking:
  enabled: false
  mountPath: "/eviction-data"
  hostPath: "/tmp/kinotic-eviction-data"

nodeSelector: {}

service:
  type: ClusterIP
  nodePorts:
    ui: null
    uiDirect: null
    openApi: null
    graphql: null
    stomp: null
  # External ports for LoadBalancer (remap external → internal)
  externalPorts:
    ui: null
    stomp: null

# Workload identity (Azure) — enables keyless auth to Azure services
workloadIdentity:
  enabled: false
  clientId: ""

# Platform secrets — JWT signing keys and secret-storage master keys mounted as files at
# platformSecrets.mountPath. The app watches these files for in-place rotation. Always
# required in clustered environments: Azure projects them via the Secrets Store CSI driver
# from the global Key Vault (keyVault.* must be set); KinD mounts a k8s Secret generated
# by local terraform. Chart rendering fails fast if keyVault.name / tenantId are missing.
platformSecrets:
  mountPath: /etc/kinotic/platform-secrets
  # Source — exactly one of `keyVault` (Azure CSI) or `secretName` (KinD k8s Secret) is used.
  keyVault:
    name: ""        # from global/ terraform output: platform_key_vault_name
    tenantId: ""    # from global/ terraform output: tenant_id
  secretName: ""    # KinD: name of a k8s Secret in the release namespace holding the same keys
  objects:
    jwtSigningKeys: kinotic-jwt-signing-keys
    secretStorageMasterKeys: kinotic-secret-storage-master-keys

# OIDC client secrets — one file per platform OidcConfiguration, keyed by configId.
# Operator-set, separate lifecycle from auto-generated platform secrets above. Each entry
# in kinotic.oidc.platformProviders[*].id corresponds to one file under mountPath.
# In Azure: pulls from Key Vault via CSI (objects[] lists the configIds to mount). In KinD:
# a k8s Secret created by `bin/set-oidc-client-secret.sh` (prompt-and-kubectl).
oidcSecrets:
  mountPath: /etc/kinotic/oidc-client-secrets
  keyVault:
    name: ""        # set to platformSecrets.keyVault.name to reuse the platform vault, or a separate one
    tenantId: ""
  secretName: ""    # KinD: e.g. "kinotic-oidc-secrets" — script populates it
  # Azure only: Key Vault secret object names; each file lands at mountPath/<objectName>.
  # The objectName must match the OidcConfiguration id used in helm values.
  objects: []

# Extra environment variables — override any Spring property via env var convention.
# Example: KINOTIC_WEBSERVER_PORT: "443"
extraEnv: {}
