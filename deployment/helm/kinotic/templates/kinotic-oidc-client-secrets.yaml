{{- if .Values.oidcSecrets.keyVault.name }}
# Pulls one Key Vault secret per OidcConfiguration id (oidcSecrets.objects[]) and syncs into
# a k8s Secret that the kinotic-server pod mounts as a volume. Each file lands at
# {{ .Values.oidcSecrets.mountPath }}/<objectName>; PlatformOidcBootstrap reads them on
# startup (re-applied every restart). Not rendered in KinD — there, the Secret is created
# directly by `bin/set-oidc-client-secret.sh`.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "kinotic-server.fullname" . }}-oidc-client-secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ required "oidcSecrets + keyVault requires workloadIdentity.clientId" .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.oidcSecrets.keyVault.name | quote }}
    tenantId: {{ required "oidcSecrets.keyVault.tenantId is required" .Values.oidcSecrets.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.oidcSecrets.objects }}
        - |
          objectName: {{ . }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ include "kinotic-server.oidcSecretsSecretName" . }}
      type: Opaque
      data:
        {{- range .Values.oidcSecrets.objects }}
        - objectName: {{ . }}
          key: {{ . }}
        {{- end }}
{{- end }}
