{{- if .Values.platformSecrets.keyVault.name }}
# Syncs platform secrets from the global Azure Key Vault into a K8s Secret that the
# kinotic-server pod mounts as a volume. The driver's rotation loop updates the Secret
# when Key Vault values change; kubelet then refreshes the mounted files in place, and
# PlatformSecretsService's file watcher picks up the new content. No pod restart needed.
# Not rendered in KinD — there, the Secret is created directly by local terraform.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "kinotic-server.fullname" . }}-platform-secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ required "platformSecrets + keyVault requires workloadIdentity.clientId" .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.platformSecrets.keyVault.name | quote }}
    tenantId: {{ required "platformSecrets.keyVault.tenantId is required" .Values.platformSecrets.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ .Values.platformSecrets.objects.jwtSigningKeys }}
          objectType: secret
        - |
          objectName: {{ .Values.platformSecrets.objects.secretStorageMasterKeys }}
          objectType: secret
  secretObjects:
    - secretName: {{ include "kinotic-server.platformSecretsSecretName" . }}
      type: Opaque
      data:
        - objectName: {{ .Values.platformSecrets.objects.jwtSigningKeys }}
          key: {{ .Values.platformSecrets.objects.jwtSigningKeys }}
        - objectName: {{ .Values.platformSecrets.objects.secretStorageMasterKeys }}
          key: {{ .Values.platformSecrets.objects.secretStorageMasterKeys }}
{{- end }}
