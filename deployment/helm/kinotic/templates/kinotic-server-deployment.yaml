apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kinotic-server.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "kinotic-server.name" . }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/kinotic-server-config-map.yaml") . | sha256sum }}
        {{- if .Values.tls.enabled }}
        secret.reloader.stakater.com/reload: {{ .Values.tls.secretName | quote }}
        {{- end }}
      labels:
        app: {{ include "kinotic-server.name" . }}
        release: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "kinotic-server.fullname" . }}
      terminationGracePeriodSeconds: 60  # Allow time for WebSocket connections to close gracefully
      containers:
        - name: kinotic-server
          image: {{ if .Values.image.sha }}"{{ .Values.image.repository }}@{{ .Values.image.sha }}"{{ else }}"{{ .Values.image.repository }}:{{ .Values.image.tag }}"{{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          lifecycle:
            preStop:
              exec:
                # Give WebSocket connections time to close gracefully before SIGTERM
                command: ["/bin/sh", "-c", "sleep 15"]
          readinessProbe:
            httpGet:
              path: "{{ .Values.properties.structures.healthCheckPath }}"
              port: {{ .Values.properties.structures.webServerPort }}
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 10
            failureThreshold: 15
            periodSeconds: 10
            timeoutSeconds: 7
          startupProbe:
            httpGet:
              path: "{{ .Values.properties.structures.healthCheckPath }}"
              port: {{ .Values.properties.structures.webServerPort }}
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 30
            failureThreshold: 15
            periodSeconds: 10
            timeoutSeconds: 7
          livenessProbe:
            httpGet:
              path: "{{ .Values.properties.structures.healthCheckPath }}"
              port: {{ .Values.properties.structures.webServerPort }}
              {{- if .Values.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 30
            failureThreshold: 30
            periodSeconds: 30
            timeoutSeconds: 7
          ports:
            - containerPort: {{ .Values.properties.structures.webServerPort| default 9090 }} # UI PORT
            - containerPort: {{ .Values.properties.structures.graphqlPort| default 4000 }} # GraphQL Port
            - containerPort: {{ .Values.properties.structures.openApiPort| default 8080 }} # OpenAPI Port
            - containerPort: {{ .Values.continuum_gateway.stomp.port| default 58503 }} # Continuum Stomp Port
            - containerPort: {{ .Values.properties.structures.restPort| default 58504 }} # Continuum REST Port
            - containerPort: {{ .Values.continuum.cluster.discoveryPort | default 47500 }} # Ignite Discovery Port
            - containerPort: {{ .Values.continuum.cluster.communicationPort | default 47100 }} # Ignite Communication Port
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "kinotic-server.fullname" . }}
          env:
            # Pod name for unique eviction file paths
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KINOTIC_PERSISTENCE_ELASTICUSERNAME
              value: "{{ .Values.properties.structures.elastic.username }}"
            - name: KINOTIC_PERSISTENCE_ELASTICPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.properties.structures.elastic.secretName }}
                  key: {{ .Values.properties.structures.elastic.secretKey }}
          volumeMounts:
            - name: tmp-work
              mountPath: /workspace/ignite/work
            {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: /certs
              readOnly: true
            {{- end }}
            {{- if .Values.evictionTracking.enabled }}
            - name: eviction-data
              mountPath: {{ .Values.evictionTracking.mountPath | default "/eviction-data" }}
            {{- end }}
      restartPolicy: Always
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      volumes:
        - name: tmp-work
          emptyDir:
            sizeLimit: 1Gi
        {{- if .Values.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.evictionTracking.enabled }}
        - name: eviction-data
          hostPath:
            path: {{ .Values.evictionTracking.hostPath | default "/tmp/kinotic-eviction-data" }}
            type: DirectoryOrCreate
        {{- end }}
