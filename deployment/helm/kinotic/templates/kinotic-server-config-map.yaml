apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kinotic-server.fullname" . }}
data:
  # ── JVM / Buildpack ───────────────────────────────────────
  SPRING_PROFILES_ACTIVE: "{{ .Values.properties.springActiveProfiles }}"
  JAVA_TOOL_OPTIONS: "{{ .Values.properties.javaToolOptions }} {{ .Values.properties.javaModuleAccess }}"
  BPL_JVM_HEAD_ROOM: "{{ .Values.properties.bplJvmHeadRoom }}"
  BPL_JAVA_NMT_ENABLED: "{{ .Values.properties.enableNmt }}"
  BPL_JMX_ENABLED: "{{ .Values.properties.enableJmx }}"

  # ── Public URL + email ────────────────────────────────────
  KINOTIC_APPBASEURL: "{{ .Values.kinotic.appBaseUrl }}"
  {{- if .Values.kinotic.apiBaseUrl }}
  KINOTIC_APIBASEURL: "{{ .Values.kinotic.apiBaseUrl }}"
  {{- end }}
  KINOTIC_DOMAIN_EMAIL_ENABLED: "{{ .Values.kinotic.domain.email.enabled }}"
  {{- if .Values.kinotic.domain.email.enabled }}
  KINOTIC_DOMAIN_EMAIL_ENDPOINT: "{{ required "kinotic.domain.email.endpoint is required when email is enabled" .Values.kinotic.domain.email.endpoint }}"
  KINOTIC_DOMAIN_EMAIL_SENDERADDRESS: "{{ required "kinotic.domain.email.senderAddress is required when email is enabled" .Values.kinotic.domain.email.senderAddress }}"
  {{- if .Values.kinotic.domain.email.managedIdentityClientId }}
  KINOTIC_DOMAIN_EMAIL_MANAGEDIDENTITYCLIENTID: "{{ .Values.kinotic.domain.email.managedIdentityClientId }}"
  {{- end }}
  {{- end }}

  # ── Elasticsearch connection ──────────────────────────────
  {{ range $index,$value:= .Values.kinotic.elastic.connections }}
  KINOTIC_PERSISTENCE_ELASTICCONNECTIONS_{{ $index }}_SCHEME: "{{ $value.scheme }}"
  KINOTIC_PERSISTENCE_ELASTICCONNECTIONS_{{ $index }}_HOST: "{{ $value.host }}"
  KINOTIC_PERSISTENCE_ELASTICCONNECTIONS_{{ $index }}_PORT: "{{ $value.port }}"
  {{ end }}

  {{- if .Values.tls.enabled }}
  # ── SSL/TLS ──────────────────────────────────────────────
  KINOTIC_SSL_ENABLED: "true"
  KINOTIC_SSL_CERTPATH: "/certs/tls.crt"
  KINOTIC_SSL_KEYPATH: "/certs/tls.key"
  {{- end }}

  {{- if .Values.evictionTracking.enabled }}
  # ── Eviction tracking ─────────────────────────────────────
  KINOTIC_CACHE_EVICTION_CSV_PATH: "{{ .Values.evictionTracking.mountPath | default "/eviction-data" }}/evictions-${POD_NAME}.csv"
  {{- end }}

  {{- with .Values.kinotic.domain.oidc }}
  {{- if .platformProviders }}
  # ── Platform OIDC providers ───────────────────────────────
  # Bootstrapped by PlatformOidcBootstrap. Each entry's id maps to a file under
  # KINOTIC_DOMAIN_OIDC_SECRETSPATH (set on the deployment when oidcSecrets is configured).
  {{- range $index, $value := .platformProviders }}
  KINOTIC_DOMAIN_OIDC_PLATFORMPROVIDERS_{{ $index }}_ID: "{{ $value.id }}"
  KINOTIC_DOMAIN_OIDC_PLATFORMPROVIDERS_{{ $index }}_NAME: "{{ $value.name }}"
  KINOTIC_DOMAIN_OIDC_PLATFORMPROVIDERS_{{ $index }}_PROVIDER: "{{ $value.provider }}"
  KINOTIC_DOMAIN_OIDC_PLATFORMPROVIDERS_{{ $index }}_CLIENT_ID: "{{ $value.clientId }}"
  KINOTIC_DOMAIN_OIDC_PLATFORMPROVIDERS_{{ $index }}_AUTHORITY: "{{ $value.authority }}"
  {{- if $value.audience }}
  KINOTIC_DOMAIN_OIDC_PLATFORMPROVIDERS_{{ $index }}_AUDIENCE: "{{ $value.audience }}"
  {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}

  # ── Extra environment variables ───────────────────────────
  # Override any Spring property via env var naming convention:
  #   kinotic.apiGateway.webServer.port → KINOTIC_APIGATEWAY_WEBSERVER_PORT
  {{- range $key, $value := .Values.extraEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
