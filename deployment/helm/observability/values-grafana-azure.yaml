# Azure overrides for Grafana.
# Access via: kubectl port-forward svc/grafana -n observability 3000:3000
# Entra ID OAuth config is injected by terraform.

grafana.ini:
  server:
    root_url: http://localhost:3000
  auth.azuread:
    name: Azure AD
    allow_sign_up: true
    auto_login: false
    scopes: openid email profile

# ClusterIP — port-forward only, no LB cost
service:
  type: ClusterIP
  port: 3000

persistence:
  storageClassName: managed-csi-premium
