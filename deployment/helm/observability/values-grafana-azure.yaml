# Azure overrides for Grafana.
# TLS using the same Let's Encrypt cert as kinotic-server.
# Entra ID OAuth config is injected by terraform.

grafana.ini:
  server:
    root_url: https://grafana.kinotic.ai
    protocol: https
    cert_file: /certs/tls.crt
    cert_key: /certs/tls.key
  auth.azuread:
    name: Azure AD
    allow_sign_up: true
    auto_login: false
    scopes: openid email profile

# Mount the TLS secret
extraSecretMounts:
  - name: tls-certs
    secretName: kinotic-tls
    mountPath: /certs
    readOnly: true

# Expose via LoadBalancer on port 3000
service:
  type: LoadBalancer
  port: 443
  targetPort: 3000

persistence:
  storageClassName: managed-csi-premium
