# Shared Loki base values (monolithic mode).
# Environment-specific overrides layer on top.

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    retention_period: 720h  # 30 days

  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi

# Disable components not used in monolithic mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable built-in monitoring for now
monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

# Disable gateway — Alloy pushes directly
gateway:
  enabled: false

# Disable caches — not needed for beta with filesystem/small volume
chunksCache:
  enabled: false

resultsCache:
  enabled: false

# Don't deploy test pods
test:
  enabled: false
