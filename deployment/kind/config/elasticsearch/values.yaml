# KinD override values for the ECK Elasticsearch Helm chart.
# Used with: helm install -f deployment/helm/elasticsearch/values.yaml -f <this file>

version: "8.18.1"

http:
  tls:
    disabled: true
  service:
    type: NodePort
    nodePort: 30920

nodeSets:
  name: default
  count: 2
  roles:
    - master
    - data
    - ingest

  config:
    xpack.security.enabled: false
    xpack.security.http.ssl.enabled: false
    xpack.security.transport.ssl.enabled: false

  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2"

  env:
    - name: ES_JAVA_OPTS
      value: "-Xms1024m -Xmx1024m"

  initContainers:
    - name: sysctl
      securityContext:
        privileged: true
        runAsUser: 0
      command: ['sh', '-c', 'sysctl -w vm.max_map_count=262144']

  antiAffinity:
    required: false

  storage:
    size: "15Gi"
    storageClassName: ""
