# KinD override values for the ECK Elasticsearch Helm chart.
# Used with: helm install -f deployment/helm/elasticsearch/values.yaml -f <this file>

version: "9.2.4"

http:
  tls:
    disabled: true
  service:
    type: ClusterIP

nodeSets:
  name: default
  count: 2
  roles:
    - master
    - data
    - ingest

  config:
    # Security enabled for ECK 3.x operator file settings compatibility.
    # ECK auto-manages internal TLS certs and the elastic user credential.
    xpack.security.enabled: true
    # Disable HTTP TLS so clients can connect without certs (dev convenience)
    xpack.security.http.ssl.enabled: false
    # Required for ECK readiness probe (checks port 8080)
    readiness.port: 8080

  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2"

  env:
    - name: ES_JAVA_OPTS
      value: "-Xms1024m -Xmx1024m"

  initContainers:
    - name: sysctl
      securityContext:
        privileged: true
        runAsUser: 0
      command: ['sh', '-c', 'sysctl -w vm.max_map_count=262144']

  antiAffinity:
    required: false

  storage:
    size: "15Gi"
    storageClassName: ""
