# Helm Values for kinotic-server deployment in KinD

replicaCount: 2

image:
  repository: kinoticai/kinotic-server
  tag: 4.2.0-SNAPSHOT
  pullPolicy: IfNotPresent

migration:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  image:
    repository: kinoticai/kinotic-migration
    tag: 4.2.0-SNAPSHOT
    pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2
    memory: 2Gi

properties:
  springActiveProfiles: "production,kubernetes,debug,eviction-tracking"
  enableJmx: true
  enableNmt: true
  javaToolOptions: "-Djava.net.preferIPv4Stack=true -XX:MaxDirectMemorySize=512m"
  bplJvmHeadRoom: 10

kinotic:
  elastic:
    connections:
      - host: "kinotic-es-es-http.elastic.svc"
        port: 9200
        scheme: "http"

# OIDC (configured when enable_keycloak=true via terraform set)
oidc:
  debug: true
  frontendConfigurationPath: "/app-config.override.json"
  oidcProviders:
    - provider: "keycloak"
      displayName: "Keycloak"
      enabled: true
      rolesClaimPath: "realm_access.roles"
      domains:
        - "example.com"
      roles:
        - "admin"
      audience: "kinotic-client"
      clientId: "kinotic-client"
      authority: "https://localhost:8888/auth/realms/test"
      backchannelAuthority: "https://keycloak:8888/auth/realms/test"
      redirectUri: "https://localhost/login"
      postLogoutRedirectUri: "https://localhost"
      silentRedirectUri: "https://localhost/silent-renew.html"

# Eviction tracking
evictionTracking:
  enabled: true
  mountPath: "/eviction-data"
  hostPath: "/eviction-data"

nodeSelector: {}
