# Helm Values for kinotic-server deployment in KinD

replicaCount: 2

image:
  repository: kinoticai/kinotic-server
  tag: 4.2.0-SNAPSHOT
  pullPolicy: IfNotPresent

migration:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  image:
    repository: kinoticai/kinotic-migration
    tag: 4.2.0-SNAPSHOT
    pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2
    memory: 2Gi

properties:
  springActiveProfiles: "production,kubernetes,debug,eviction-tracking"
  enableJmx: true
  enableNmt: true
  javaToolOptions: "-Djava.net.preferIPv4Stack=true -XX:MaxDirectMemorySize=512m"
  bplJvmHeadRoom: 10

kinotic:
  # KinD exposes the cluster ingress on host port 443 (TLS via mkcert) or 9090 (plain).
  # appBaseUrl gets re-set from terraform based on use_mkcert; default here covers TLS.
  appBaseUrl: "https://localhost"
  # SPA is hosted outside the cluster — no static server inside.
  webServer:
    enabled: false
  email:
    enabled: false
  elastic:
    connections:
      - host: "kinotic-es-es-http.elastic.svc"
        port: 9200
        scheme: "http"

# Platform secrets — KinD path: terraform creates a k8s Secret named below with the
# JWT signing keys and secret-storage master keys. Pod mounts it directly (no CSI).
platformSecrets:
  secretName: kinotic-platform-secrets

# Eviction tracking
evictionTracking:
  enabled: true
  mountPath: "/eviction-data"
  hostPath: "/eviction-data"

nodeSelector: {}
