# Azure AKS overrides for kinotic-server.
# Most config comes from application-kubernetes.yml Spring profile.
# Only override what differs between environments here.

replicaCount: 2

image:
  pullPolicy: Always

migration:
  backoffLimit: 5
  activeDeadlineSeconds: 600

properties:
  springActiveProfiles: "production,kubernetes"

kinotic:
  # Web UI on 443 — Azure LB is L4, can't remap ports
  webServerPort: 8443
  elastic:
    connections:
      - host: "kinotic-es-es-http.elastic.svc"
        port: 9200
        scheme: "http"

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 2
    memory: 2Gi

# Service — Azure Load Balancer (L4 TCP passthrough)
service:
  type: LoadBalancer
  externalPorts:
    ui: 443

# Override web server port via Spring env var
extraEnv:
  KINOTIC_PERSISTENCE_WEBSERVERPORT: "8443"
  KINOTIC_PERSISTENCE_CORSALLOWEDORIGINPATTERN: "https://.*\\.kinotic\\.ai(:\\d+)?|https://kinotic\\.ai(:\\d+)?"
