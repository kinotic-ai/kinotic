services:
  kinotic-server:
    environment:
      # Trace logging on the auth-flow handlers + OAuth2 plumbing — useful when iterating
      # on the OIDC roundtrip locally. Trim back if it gets noisy.
      - LOGGING_LEVEL_ORG_KINOTIC_GATEWAY_INTERNAL_ENDPOINTS_REST=TRACE
      - LOGGING_LEVEL_ORG_KINOTIC_GATEWAY_INTERNAL_AUTH=TRACE
      - LOGGING_LEVEL_IO_VERTX_EXT_AUTH_OAUTH2=DEBUG
      # Wire Keycloak as a platform OIDC provider so it shows up as
      # "Continue with Keycloak" on /login and /signup. The redirect URIs
      # registered in keycloak-test-realm.json must match
      # <appBaseUrl>/api/{login,signup}/callback/keycloak.
      - KINOTIC_OIDC_SECRETSPATH=/var/run/kinotic-oidc-secrets
      - KINOTIC_OIDC_PLATFORMPROVIDERS_0_ID=keycloak
      - KINOTIC_OIDC_PLATFORMPROVIDERS_0_NAME=Keycloak
      - KINOTIC_OIDC_PLATFORMPROVIDERS_0_PROVIDER=keycloak
      - KINOTIC_OIDC_PLATFORMPROVIDERS_0_CLIENT_ID=kinotic-client
      - KINOTIC_OIDC_PLATFORMPROVIDERS_0_AUTHORITY=http://keycloak:8888/auth/realms/test
    volumes:
      # Single-file mount: PlatformOidcBootstrap reads
      # ${KINOTIC_OIDC_SECRETSPATH}/<configId>, so this lands the keycloak secret at
      # /var/run/kinotic-oidc-secrets/keycloak. The host file is committed (dev-only
      # secret matching keycloak-test-realm.json's "secret": ...).
      - ./dev-keycloak-oidc-secret:/var/run/kinotic-oidc-secrets/keycloak:ro

  keycloak-db:
    container_name: keycloak-db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes: []
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.3.3
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # KC_HOSTNAME=keycloak so JWT iss claim is http://keycloak:8888/auth/realms/test —
      # matches what kinotic-server discovers + what isIssuerValid expects. Browser-side
      # resolution requires `127.0.0.1 keycloak` in /etc/hosts (see KEYCLOAK_HOSTS_SETUP.md).
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_HTTP_RELATIVE_PATH: /auth
      KC_METRICS_ENABLED: true
      KC_HEALTH_ENABLED: true
      KC_HTTP_PORT: 8888
    ports:
      - "127.0.0.1:8888:8888"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 10 bash -c '</dev/tcp/127.0.0.1/8888'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ./keycloak-test-realm.json:/opt/keycloak/data/import/test-realm.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
