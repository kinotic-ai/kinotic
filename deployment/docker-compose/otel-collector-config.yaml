receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  resource:
    attributes:
      - key: service.name
        value: kinotic-server
        action: insert

exporters:
  otlp/tempo:
    endpoint: "tempo:4317"  # Traces to Tempo (gRPC)
    tls:
      insecure: true
  # Logs to Loki via OTLP (Loki 3.x exposes /otlp natively). The dedicated `loki`
  # exporter was removed from otelcol-contrib; otlphttp is the supported path.
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true
  otlphttp/mimir:  # Metrics to Mimir via OTLP
    endpoint: "http://mimir:9009/otlp"
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/tempo]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/loki]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/mimir]