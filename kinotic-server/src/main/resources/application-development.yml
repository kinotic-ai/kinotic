# YAML Reference http://www.yaml.org/refcard.html
kinotic:
  debug: true
  maxNumberOfCoresToUse: 4
  ignite:
    discoveryType: SHAREDFS
  secretStorage:
    backend: hft
  platformSecrets:
    # Auto-seeded on first boot by DevPlatformSecretsGenerator (dev profile only). Each
    # developer machine ends up with its own random keys; none of this is committed.
    # Production uses Azure Key Vault via the Secrets Store CSI driver — same file layout,
    # different origin.
    jwtSigningKeysPath: ${user.home}/.kinotic/dev-platform-secrets/jwt-signing-keys
    secretStorageMasterKeysPath: ${user.home}/.kinotic/dev-platform-secrets/secret-storage-master-keys
  persistence:
    corsAllowedOriginPattern: "https:\\/\\/studio.apollographql.com|http:\\/\\/localhost:\\d+|http:\\/\\/121.0.0.1:\\d+"
    corsAllowedHeaders:
      - "*"
    corsAllowCredentials: true
    elastic-connections:
      - scheme: "http"
        host: "localhost"
        port: "9200"

logging:
  level:
    org:
      kinotic: TRACE
#    io:
#      vertx: WARN
#      netty:
#        util: DEBUG
#        buffer: DEBUG

spring:
  ai:
    openai:
      api-key: "noop"
      base-url: https://api.x.ai
      chat:
        options:
          model: grok-4

