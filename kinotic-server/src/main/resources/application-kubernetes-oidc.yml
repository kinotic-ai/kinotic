# Kubernetes OIDC profile (Keycloak).
# Activate with: SPRING_PROFILES_ACTIVE=production,kubernetes,kubernetes-oidc
#
# Layers on top of the kubernetes profile to enable OIDC authentication.
# OIDC provider details (authority, clientId, redirectUri, etc.) come from env vars.

kinotic:
  persistence:
    openApiSecurityType: BEARER

oidc-security-service:
  enabled: true
