# Kubernetes base profile.
# Activate with: SPRING_PROFILES_ACTIVE=production,kubernetes
#
# Only contains properties that differ from code defaults
# and are required for Kubernetes deployments.
# Elasticsearch host/port/credentials come from env vars or secretKeyRef.

logging:
  structured:
    format:
      console: logstash

kinotic:
  ignite:
    discoveryType: KUBERNETES
    localAddress: "0.0.0.0"
    kubernetesNamespace: kinotic
    kubernetesServiceName: kinotic
    kubernetesIncludeNotReadyAddresses: true

  cors:
    allowedOriginPattern: "*"
