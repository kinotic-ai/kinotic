spring:
  profiles:
    active: test
  ai:
    openai:
      api-key: "test-key"
      base-url: https://api.x.ai
      chat:
        options:
          model: grok-4
  main:
    allow-bean-definition-overriding: true


kinotic:
  debug: true
  maxNumberOfCoresToUse: 4
  persistence:
    enable-static-file-server: true
    web-server-port: 8989
    cors-allowed-origin-pattern: "*"
    cors-allowed-headers: "*"
    cors-allow-credentials: true

logging:
  level:
    org:
      springframework:
        web: DEBUG
      kinotic: TRACE
    io:
      vertx: DEBUG

